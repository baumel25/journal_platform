{% extends 'editor/base_admin.html' %}

{% block page_title %}Changer le rôle{% endblock %}

{% block content %}
<div class="card" style="max-width: 500px; margin: 0 auto;">
    <h2>Changer le rôle de: {{ target_user.username }}</h2>
    
    <div style="margin: 1rem 0; padding: 1rem; background: #f8fafc; border-radius: 5px;">
        <p><strong>Rôle actuel:</strong> {{ target_user.get_role_display }}</p>
    </div>
    
    <form method="post">
        {% csrf_token %}
        
        <div class="form-group">
            <label>Nouveau rôle</label>
            <select name="role" class="form-control" required>
                <option value="author" {% if target_user.role == 'author' %}selected{% endif %}>Auteur</option>
                <option value="reviewer" {% if target_user.role == 'reviewer' %}selected{% endif %}>Relecteur</option>
                <option value="editor" {% if target_user.role == 'editor' %}selected{% endif %}>Éditeur</option>
            </select>
        </div>
        
        <div style="margin-top: 1rem;">
            <button type="submit" class="btn btn-primary">Changer le rôle</button>
            <a href="{% url 'editor_user_detail' target_user.id %}" class="btn">Annuler</a>
        </div>
    </form>
</div>
{% endblock %}

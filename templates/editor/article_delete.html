{% extends 'editor/base_admin.html' %}

{% block page_title %}Delete Article{% endblock %}

{% block content %}
<div class="card" style="background: white; padding: 2rem; border-radius: 10px; max-width: 500px; margin: 0 auto; text-align: center;">
    <h2>Confirm Delete</h2>
    <p>Are you sure you want to delete the article <strong>"{{ article.title }}"</strong>?</p>
    <p style="color: red; margin: 1rem 0;">This action cannot be undone!</p>
    
    <form method="post">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger">Yes, Delete</button>
        <a href="{% url 'editor_articles' %}" class="btn">Cancel</a>
    </form>
</div>
{% endblock %}

{% extends 'editor/base_admin.html' %}

{% block page_title %}Delete Article{% endblock %}

{% block content %}
<div class="row justify-content-center" style="margin-top: 2rem;">
    <div class="col-md-6 col-lg-5">
        <div class="card-modern text-center">
            <div class="card-body p-5">
                <div class="mb-4" style="font-size: 3rem; color: var(--danger);">
                    <i class="bi bi-exclamation-triangle"></i>
                </div>
                <h4 class="fw-bold mb-3">Confirm Deletion</h4>
                <p class="text-muted mb-1">Are you sure you want to delete:</p>
                <p class="fw-bold fs-5 mb-4">"{{ article.title }}"</p>
                <div class="alert alert-danger">
                    <i class="bi bi-info-circle me-2"></i>This action cannot be undone!
                </div>
                
                <form method="post">
                    {% csrf_token %}
                    <div class="d-flex gap-2 justify-content-center">
                        <button type="submit" class="btn btn-danger px-4">
                            <i class="bi bi-trash me-1"></i>Yes, Delete
                        </button>
                        <a href="{% url 'editor_articles' %}" class="btn btn-outline-secondary px-4">
                            <i class="bi bi-x me-1"></i>Cancel
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% extends 'base.html' %}

{% block content %}
<div class="container">
    <div class="row justify-content-center" style="margin-top: 3rem;">
        <div class="col-md-5 col-lg-4">
            <div class="card-modern">
                <div class="card-body p-4">
                    <div class="text-center mb-4">
                        <div class="mb-3" style="font-size: 2.5rem; color: var(--primary);">
                            <i class="bi bi-box-arrow-in-right"></i>
                        </div>
                        <h4 class="fw-bold">Welcome Back</h4>
                        <p class="text-muted small">Sign in to your account</p>
                    </div>
                    
                    <form method="post">
                        {% csrf_token %}
                        
                        <div class="mb-3">
                            <label class="form-label">Username</label>
                            <div class="input-group">
                                <span class="input-group-text bg-light border-end-0">
                                    <i class="bi bi-person"></i>
                                </span>
                                <input type="text" name="username" class="form-control border-start-0 ps-0" placeholder="Enter your username" required>
                            </div>
                        </div>
                        
                        <div class="mb-4">
                            <label class="form-label">Password</label>
                            <div class="input-group">
                                <span class="input-group-text bg-light border-end-0">
                                    <i class="bi bi-lock"></i>
                                </span>
                                <input type="password" name="password" class="form-control border-start-0 ps-0" placeholder="Enter your password" required>
                            </div>
                        </div>
                        
                        <button type="submit" class="btn btn-primary w-100 py-2 mb-3">
                            <i class="bi bi-box-arrow-in-right me-2"></i>Sign In
                        </button>
                    </form>
                    
                    <div class="text-center">
                        <p class="text-muted small mb-0">
                            Don't have an account? 
                            <a href="{% url 'register' %}" class="fw-semibold">Register here</a>
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
